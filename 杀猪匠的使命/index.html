    const manifest = DATA.manifest;
    const allScenes = DATA.scenes;
    const allShots = DATA.shots;

    // ── 工具函数 ──

    function getSceneInfo(sceneRef) {
      return allScenes.find(s => s.id === sceneRef) || { name: sceneRef };
    }

    function getCharacterInfo(charRef) {
      if (!manifest.characters) return { name: charRef, id: charRef };
      return manifest.characters.find(c => c.id === charRef) || { name: charRef, id: charRef };
    }

    // ── 渲染函数 ──

    function renderStats() {
      const el = document.getElementById('stats');
      const imgDone = allShots.filter(s => s.image_status === 'completed').length;
      const totalLines = allShots.reduce((sum, s) => sum + (s.lines?.length || 0), 0);
      const audioDone = allShots.reduce((sum, s) =>
        sum + (s.lines || []).filter(l => l.audio_url).length, 0);
      const videoDone = allShots.filter(s => s.video_url).length;

      el.innerHTML = `
        <div class="stat-item"><div class="stat-value">${allScenes.length}</div><div class="stat-label">场景数</div></div>
        <div class="stat-item"><div class="stat-value">${allShots.length}</div><div class="stat-label">镜头数</div></div>
        <div class="stat-item"><div class="stat-value">${imgDone}/${allShots.length}</div><div class="stat-label">已生图</div></div>
        <div class="stat-item"><div class="stat-value">${audioDone}/${totalLines}</div><div class="stat-label">已配音</div></div>
        <div class="stat-item"><div class="stat-value">${videoDone}/${allShots.length}</div><div class="stat-label">已生视频</div></div>
        <div class="stat-item"><div class="stat-value">${totalLines}</div><div class="stat-label">总台词</div></div>
      `;
    }

    function renderNav() {
      const el = document.getElementById('nav');
      el.innerHTML = allShots.map((shot, i) =>
        `<a href="#${shot.id}" title="${shot.title}">${i + 1}. ${shot.title}</a>`
      ).join('');
    }

    function renderShotCard(shot, index) {
      const scene = getSceneInfo(shot.scene_ref);
      const status = shot.image_status || 'pending';
      const statusLabel = status === 'pending' ? '待生图' : '已生图';

      // 图片：优先 image_url（远程），其次 image_path（相对路径）
      const imgSrc = shot.image_url || (shot.image_path ? `shots/${shot.image_path}` : '');
      const imageHtml = imgSrc && status !== 'pending'
        ? `<img src="${imgSrc}" alt="${shot.title}" onclick="openModal('${imgSrc}')" onerror="this.parentElement.innerHTML='<div class=\\'placeholder\\'>图片加载失败</div>'">`
        : `<div class="placeholder">待生成配图</div>`;

      // 角色
      const charsHtml = (shot.characters || []).map(c => {
        const info = getCharacterInfo(c.ref);
        return `<span><span class="character-name">${info.name}</span> <span class="character-action">${c.action || ''}${c.emotion ? ' · ' + c.emotion : ''}</span></span>`;
      }).join('');

      // 台词
      const linesHtml = (shot.lines || []).map(line => {
        const isNarr = line.speaker === '旁白';
        const emo = line.emotion ? `<span class="emotion">⚡ ${line.emotion}</span>` : '';
        const audio = line.audio_url ? `<audio controls preload="none" src="${line.audio_url}"></audio>` : '';
        return `<p class="line ${isNarr ? 'narration' : 'character'}"><span class="speaker">【${line.speaker}】</span>${line.text}${emo}${audio}</p>`;
      }).join('') || '<p class="line" style="color:var(--text-muted)">（无台词）</p>';

      return `
        <div class="shot-card" id="${shot.id}" data-status="${status}">
          <div class="shot-image">
            ${imageHtml}
            <span class="shot-number">${String(index + 1).padStart(2, '0')}</span>
            <span class="shot-status ${status}">${statusLabel}</span>
          </div>
          <div class="shot-info">
            <h3>${shot.id} | ${shot.title}</h3>
            <div class="tags">
              <span class="tag scene">📍 ${scene.name}</span>
              <span class="tag mood">💫 ${shot.mood || '—'}</span>
              ${shot.lighting ? `<span class="tag lighting">💡 ${shot.lighting}</span>` : ''}
              ${shot.shot_type ? `<span class="tag shot-type">📷 ${shot.shot_type}</span>` : ''}
            </div>
          </div>
          ${charsHtml ? `<div class="characters-bar">${charsHtml}</div>` : ''}
          <div class="lines">${linesHtml}</div>
          ${shot.video_url ? `
          <div class="shot-video">
            <video controls preload="metadata" src="${shot.video_url}" poster="${imgSrc || ''}"></video>
            <div class="video-meta">
              ${shot.video_mode ? `<span>模式: <span class="video-mode">${shot.video_mode}</span></span>` : ''}
              ${shot.video_duration ? `<span>时长: ${shot.video_duration}s</span>` : ''}
            </div>
          </div>` : ''}
          <div class="collapsible-toggle" onclick="toggleCollapsible(this)">
            <span class="arrow">▶</span> 查看配图提示词
          </div>
          <div class="collapsible-content">
            <button class="copy-btn" onclick="copyPrompt(event, this)">复制</button>
            ${shot.prompt || '（无提示词）'}
          </div>
        </div>`;
    }

    function renderShots() {
      const container = document.getElementById('shots-container');
      let html = '';
      let currentScene = '';

      allShots.forEach((shot, i) => {
        if (shot.scene_ref !== currentScene) {
          currentScene = shot.scene_ref;
          const scene = getSceneInfo(currentScene);
          html += `
            <div class="scene-separator">
              <h2>📍 ${scene.id} ${scene.name}</h2>
              <div class="scene-meta">
                ${scene.description ? `<span>${scene.description}</span>` : ''}
                ${scene.mood ? `<span>💫 ${scene.mood}</span>` : ''}
                ${scene.lighting ? `<span>💡 ${scene.lighting}</span>` : ''}
              </div>
            </div>`;
        }
        html += renderShotCard(shot, i);
      });

      container.innerHTML = html;
    }

    // ── 交互函数 ──

    function toggleCollapsible(el) {
      const content = el.nextElementSibling;
      const isShow = content.classList.toggle('show');
      el.classList.toggle('open', isShow);
      el.querySelector('.arrow').textContent = isShow ? '▼' : '▶';
    }

    function copyPrompt(event, btn) {
      event.stopPropagation();
      const text = btn.parentElement.textContent.replace('复制', '').trim();
      navigator.clipboard.writeText(text).then(() => {
        btn.textContent = '已复制!';
        setTimeout(() => btn.textContent = '复制', 1500);
      });
    }

    function openModal(src) {
      document.getElementById('modal-img').src = src;
      document.getElementById('modal').classList.add('show');
      document.body.style.overflow = 'hidden';
    }

    function closeModal() {
      document.getElementById('modal').classList.remove('show');
      document.body.style.overflow = '';
    }

    function scrollToTop() {
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // ── 搜索 & 过滤 ──

    document.getElementById('search').addEventListener('input', e => {
      const q = e.target.value.toLowerCase().trim();
      document.querySelectorAll('.shot-card').forEach(card => {
        if (!q) { card.classList.remove('hidden', 'highlight'); return; }
        const match = card.textContent.toLowerCase().includes(q);
        card.classList.toggle('hidden', !match);
        card.classList.toggle('highlight', match);
      });
    });

    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const filter = btn.dataset.filter;
        document.querySelectorAll('.shot-card').forEach(card => {
          const status = card.dataset.status;
          card.classList.toggle('hidden',
            filter === 'pending' ? status !== 'pending' :
            filter === 'completed' ? status === 'pending' : false
          );
        });
      });
    });

    // ── 快捷键 ──

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') closeModal();
      if (e.key === '/' && e.target.tagName !== 'INPUT') {
        e.preventDefault();
        document.getElementById('search').focus();
      }
    });

    // ── 返回顶部 ──

    window.addEventListener('scroll', () => {
      document.getElementById('back-to-top').classList.toggle('show', window.scrollY > 500);
    });

    // ── 导航高亮 ──

    const observer = new IntersectionObserver(entries => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          document.querySelectorAll('.nav a').forEach(a => a.classList.remove('current'));
          const link = document.querySelector(`.nav a[href="#${entry.target.id}"]`);
          if (link) link.classList.add('current');
        }
      });
    }, { rootMargin: '-100px 0px -70% 0px' });

    // ── 初始化渲染 ──

    renderStats();
    renderNav();
    renderShots();

    // 观察所有卡片
    document.querySelectorAll('.shot-card').forEach(card => observer.observe(card));

    // URL hash 跳转
    if (window.location.hash) {
      const el = document.getElementById(window.location.hash.substring(1));
      if (el) setTimeout(() => el.scrollIntoView({ behavior: 'smooth' }), 100);
    }
  </script>
