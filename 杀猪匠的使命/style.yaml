# style.yaml - 全局绘画风格与视觉参数配置
# 所有绘图（角色/场景/分镜）和视频生成统一从此文件读取风格参数
# 修改画风只需改这一处，全流水线自动生效
#
# 被以下 skill 引用：
#   novel-01  角色提取（角色立绘风格 + 尺寸）
#   novel-04  场景转分镜（提示词风格前缀，写入 _manifest.yaml）
#   novel-05  分镜绘图（风格词替换 + 图片尺寸）
#   novel-07  AI 视频生成（视频宽高比 + 分辨率）
#   novel-08  视频合成（帧率）

version: "1.0"

# ═══════════════════════════════════════════
# 全局风格基准词
# ═══════════════════════════════════════════
# 所有绘图 prompt 的风格前缀，保证全剧画风一致
# 修改此字段即可一键切换全剧画风

style_base: >-
  真人写实高清，超细节刻画，古风人像写实，光影细腻，氛围感拉满，
  服饰纹理清晰，面部神态精准，动态自然，暖黄色的光线，背景虚化氛围感强

# 负面提示词（部分模型支持）
negative_prompt: >-
  低质量，模糊，变形，多余手指，文字水印，
  过度曝光，卡通风格，2D平面

# ═══════════════════════════════════════════
# 图片尺寸配置
# ═══════════════════════════════════════════
# preset 值对应 Seedream 4.5 API 参数：
#   landscape_16_9  → 16:9 横版 (1280×720)
#   portrait_16_9   → 9:16 竖版 (720×1280)
#   portrait_4_3    → 3:4  竖版 (768×1024)
#   square          → 1:1  方形 (1024×1024)

image_sizes:
  # 角色立绘（novel-01 使用）
  character:
    preset: "portrait_4_3"
    description: "角色全身立绘，3:4 竖版，白底设定图"

  # 分镜配图（novel-05 使用）
  storyboard:
    preset: "portrait_16_9"
    description: "分镜头配图，9:16 竖版，适配抖音/快手/小红书"

  # 场景概念图（可选，用于场景设定）
  scene:
    preset: "landscape_16_9"
    description: "场景全景图，16:9 横版，适配 B站/YouTube"

# ═══════════════════════════════════════════
# 视频参数配置
# ═══════════════════════════════════════════
# novel-07 (AI 视频) 和 novel-08 (FFmpeg 合成) 共用

video:
  aspect_ratio: "9:16"          # 视频宽高比：9:16 / 16:9 / 1:1
  resolution: "720p"            # 分辨率：480p / 720p
  duration_default: "5"         # AI 视频默认时长（秒）
  fps: 24                       # FFmpeg 合成帧率

# ═══════════════════════════════════════════
# 场景类型色调预设
# ═══════════════════════════════════════════
# novel-04 生成分镜提示词时，根据场景类型追加色调描述

mood_presets:
  reality: "正常色调，自然光线"
  flashback: "褪色暖调，柔光暗角，颗粒感，回忆氛围"
  dream: "高饱和超现实色调，雾气弥漫，自发光边缘"
  montage: "快节奏剪辑感，多画面并置，时间流逝"
  prologue: "高对比暗调，悬疑氛围，局部高光"

# ═══════════════════════════════════════════
# 光照预设
# ═══════════════════════════════════════════
# novel-04 生成分镜提示词时，根据时间/地点追加光照描述

lighting_presets:
  day_indoor: "暖调侧光，窗户光斑，柔和漫射"
  day_outdoor: "明亮自然光，天空高远，层次分明"
  night_indoor: "暖黄油灯/烛光，暗角光晕，明暗对比强"
  night_outdoor: "冷调月光/火把，深邃阴影，星空微光"
  dawn: "金粉暖光，雾气氤氲，天际泛红"
  dusk: "夕阳橘红，长影斜照，暖金色调"
