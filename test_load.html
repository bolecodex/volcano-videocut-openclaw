<script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>
<pre id="output">Loading...</pre>
<script>
async function test() {
  const out = document.getElementById('output');
  try {
    const r1 = await fetch('/杀猪匠的使命/shots/_manifest.yaml');
    const t1 = await r1.text();
    const manifest = jsyaml.load(t1);
    out.textContent = 'Manifest OK: ' + manifest.files.length + ' files\n';
    
    for (const f of manifest.files) {
      try {
        const r = await fetch('/杀猪匠的使命/shots/' + f.file);
        const t = await r.text();
        const d = jsyaml.load(t);
        out.textContent += 'OK: ' + f.file + ' (' + (d.shots?.length || 0) + ' shots)\n';
      } catch(e) {
        out.textContent += 'FAIL: ' + f.file + ' - ' + e.message + '\n';
      }
    }
  } catch(e) {
    out.textContent = 'ERROR: ' + e.message + '\n' + e.stack;
  }
}
test();
</script>
