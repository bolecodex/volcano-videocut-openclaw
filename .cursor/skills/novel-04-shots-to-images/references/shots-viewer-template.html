<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>分镜查看器</title>
    <script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>
    <style>
        :root {
            --bg-primary: #0f0f0f;
            --bg-secondary: #1a1a1a;
            --bg-card: #242424;
            --text-primary: #f0f0f0;
            --text-secondary: #a0a0a0;
            --accent: #d4a853;
            --accent-dim: #8b7355;
            --border: #333;
            --success: #4ade80;
            --shadow: rgba(0,0,0,0.4);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }
        
        /* 文件上传区域 */
        .upload-section {
            background: linear-gradient(135deg, var(--bg-secondary) 0%, var(--bg-card) 100%);
            border: 2px dashed var(--border);
            border-radius: 16px;
            padding: 3rem;
            text-align: center;
            margin-bottom: 2rem;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        
        .upload-section:hover {
            border-color: var(--accent);
            background: linear-gradient(135deg, var(--bg-card) 0%, #2a2520 100%);
        }
        
        .upload-section.drag-over {
            border-color: var(--accent);
            background: #2a2520;
        }
        
        .upload-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }
        
        .upload-text {
            font-size: 1.2rem;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
        }
        
        .upload-hint {
            font-size: 0.9rem;
            color: var(--text-secondary);
            opacity: 0.7;
        }
        
        #fileInput {
            display: none;
        }
        
        /* 场景头部 */
        .scene-header {
            background: linear-gradient(135deg, #2a2520 0%, var(--bg-card) 100%);
            border-radius: 16px;
            padding: 2rem;
            margin-bottom: 2rem;
            border: 1px solid var(--border);
        }
        
        .scene-title {
            font-size: 2rem;
            font-weight: 700;
            color: var(--accent);
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        
        .scene-id {
            font-size: 0.9rem;
            background: var(--accent-dim);
            color: var(--bg-primary);
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-weight: 600;
        }
        
        .scene-meta {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-top: 1.5rem;
        }
        
        .meta-item {
            background: var(--bg-secondary);
            padding: 1rem;
            border-radius: 12px;
        }
        
        .meta-label {
            font-size: 0.8rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.25rem;
        }
        
        .meta-value {
            font-size: 1rem;
            color: var(--text-primary);
        }
        
        /* 镜头列表 */
        .shots-container {
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }
        
        .shot-card {
            background: var(--bg-card);
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid var(--border);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        
        .shot-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 32px var(--shadow);
        }
        
        .shot-header {
            background: linear-gradient(90deg, var(--bg-secondary) 0%, transparent 100%);
            padding: 1rem 1.5rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            border-bottom: 1px solid var(--border);
        }
        
        .shot-number {
            background: var(--accent);
            color: var(--bg-primary);
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.9rem;
        }
        
        .shot-info h3 {
            font-size: 1.2rem;
            margin-bottom: 0.25rem;
        }
        
        .shot-type {
            font-size: 0.85rem;
            color: var(--accent-dim);
        }
        
        .shot-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
            padding: 1.5rem;
        }
        
        @media (max-width: 768px) {
            .shot-content {
                grid-template-columns: 1fr;
            }
        }
        
        /* 图片展示 */
        .shot-image-container {
            position: relative;
            border-radius: 12px;
            overflow: hidden;
            background: var(--bg-secondary);
            aspect-ratio: 16/9;
        }
        
        .shot-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .shot-image-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }
        
        .image-status {
            position: absolute;
            top: 0.75rem;
            right: 0.75rem;
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        
        .image-status.completed {
            background: var(--success);
            color: var(--bg-primary);
        }
        
        .image-status.pending {
            background: var(--accent-dim);
            color: var(--text-primary);
        }
        
        /* 镜头详情 */
        .shot-details {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        
        .detail-section {
            background: var(--bg-secondary);
            border-radius: 10px;
            padding: 1rem;
        }
        
        .detail-title {
            font-size: 0.8rem;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.75rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .detail-title::before {
            content: '';
            width: 3px;
            height: 14px;
            background: var(--accent);
            border-radius: 2px;
        }
        
        /* 角色列表 */
        .character-item {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
            padding: 0.75rem 0;
            border-bottom: 1px solid var(--border);
        }
        
        .character-item:last-child {
            border-bottom: none;
            padding-bottom: 0;
        }
        
        .character-item:first-child {
            padding-top: 0;
        }
        
        .character-ref {
            color: var(--accent);
            font-weight: 600;
            font-size: 0.9rem;
        }
        
        .character-action {
            color: var(--text-primary);
            font-size: 0.9rem;
        }
        
        .character-emotion {
            color: var(--text-secondary);
            font-size: 0.85rem;
            font-style: italic;
        }
        
        /* 台词区域 */
        .lines-container {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }
        
        .line-item {
            background: var(--bg-primary);
            border-radius: 8px;
            padding: 0.75rem 1rem;
            border-left: 3px solid var(--accent-dim);
        }
        
        .line-speaker {
            font-size: 0.8rem;
            color: var(--accent);
            font-weight: 600;
            margin-bottom: 0.25rem;
        }
        
        .line-text {
            font-size: 0.95rem;
            color: var(--text-primary);
            margin-bottom: 0.5rem;
        }
        
        .line-emotion {
            font-size: 0.8rem;
            color: var(--text-secondary);
            font-style: italic;
        }
        
        /* 音频播放器 */
        .audio-player {
            width: 100%;
            height: 32px;
            margin-top: 0.5rem;
            border-radius: 6px;
        }
        
        .audio-player::-webkit-media-controls-panel {
            background: var(--bg-secondary);
        }
        
        /* 构图信息 */
        .composition-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.75rem;
        }
        
        .composition-item {
            text-align: center;
        }
        
        .composition-label {
            font-size: 0.75rem;
            color: var(--text-secondary);
        }
        
        .composition-value {
            font-size: 0.9rem;
            color: var(--text-primary);
        }
        
        /* Prompt 展示 */
        .prompt-text {
            font-size: 0.85rem;
            color: var(--text-secondary);
            line-height: 1.7;
            white-space: pre-wrap;
            font-family: 'SF Mono', Monaco, monospace;
            background: var(--bg-primary);
            padding: 0.75rem;
            border-radius: 6px;
            max-height: 120px;
            overflow-y: auto;
        }
        
        /* 标签样式 */
        .tag {
            display: inline-block;
            padding: 0.2rem 0.6rem;
            border-radius: 4px;
            font-size: 0.8rem;
            margin-right: 0.5rem;
            margin-bottom: 0.25rem;
        }
        
        .tag-mood {
            background: rgba(212, 168, 83, 0.2);
            color: var(--accent);
        }
        
        .tag-lighting {
            background: rgba(139, 115, 85, 0.3);
            color: #c4a87a;
        }
        
        /* 隐藏状态 */
        .hidden {
            display: none !important;
        }
        
        /* 滚动条 */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        
        ::-webkit-scrollbar-track {
            background: var(--bg-secondary);
            border-radius: 3px;
        }
        
        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent-dim);
        }
        
        /* 加载动画 */
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 4rem;
            color: var(--text-secondary);
        }
        
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 1rem;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* 错误提示 */
        .error-message {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid #ef4444;
            border-radius: 12px;
            padding: 1.5rem;
            color: #f87171;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 文件上传区域 -->
        <div class="upload-section" id="uploadSection">
            <div class="upload-icon">📁</div>
            <div class="upload-text">拖拽 YAML 文件到此处，或点击选择文件</div>
            <div class="upload-hint">支持 .yaml / .yml 格式的分镜数据文件</div>
            <input type="file" id="fileInput" accept=".yaml,.yml">
        </div>
        
        <!-- 内容展示区域 -->
        <div id="contentArea" class="hidden">
            <!-- 场景头部 -->
            <div class="scene-header" id="sceneHeader"></div>
            
            <!-- 镜头列表 -->
            <div class="shots-container" id="shotsContainer"></div>
        </div>
        
        <!-- 错误提示 -->
        <div id="errorArea" class="hidden"></div>
    </div>

    <script>
        const uploadSection = document.getElementById('uploadSection');
        const fileInput = document.getElementById('fileInput');
        const contentArea = document.getElementById('contentArea');
        const sceneHeader = document.getElementById('sceneHeader');
        const shotsContainer = document.getElementById('shotsContainer');
        const errorArea = document.getElementById('errorArea');

        // 点击上传区域
        uploadSection.addEventListener('click', () => fileInput.click());

        // 文件选择
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleFile(e.target.files[0]);
            }
        });

        // 拖拽事件
        uploadSection.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadSection.classList.add('drag-over');
        });

        uploadSection.addEventListener('dragleave', () => {
            uploadSection.classList.remove('drag-over');
        });

        uploadSection.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadSection.classList.remove('drag-over');
            if (e.dataTransfer.files.length > 0) {
                handleFile(e.dataTransfer.files[0]);
            }
        });

        // 处理文件
        function handleFile(file) {
            if (!file.name.match(/\.(yaml|yml)$/i)) {
                showError('请选择 YAML 文件（.yaml 或 .yml）');
                return;
            }

            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const data = jsyaml.load(e.target.result);
                    renderContent(data);
                } catch (err) {
                    showError('YAML 解析错误：' + err.message);
                }
            };
            reader.readAsText(file);
        }

        // 显示错误
        function showError(message) {
            errorArea.innerHTML = `<div class="error-message">⚠️ ${message}</div>`;
            errorArea.classList.remove('hidden');
            contentArea.classList.add('hidden');
        }

        // 渲染内容
        function renderContent(data) {
            errorArea.classList.add('hidden');
            contentArea.classList.remove('hidden');
            
            // 渲染场景头部
            renderSceneHeader(data);
            
            // 渲染镜头列表
            renderShots(data.shots || []);
        }

        // 渲染场景头部
        function renderSceneHeader(data) {
            sceneHeader.innerHTML = `
                <div class="scene-title">
                    ${data.scene_name || '未命名场景'}
                    <span class="scene-id">${data.scene_id || ''}</span>
                </div>
                <div class="scene-meta">
                    <div class="meta-item">
                        <div class="meta-label">场景描述</div>
                        <div class="meta-value">${data.scene_description || '-'}</div>
                    </div>
                    <div class="meta-item">
                        <div class="meta-label">场景类型</div>
                        <div class="meta-value">${data.scene_type || '-'}</div>
                    </div>
                    <div class="meta-item">
                        <div class="meta-label">氛围</div>
                        <div class="meta-value">${data.scene_mood || '-'}</div>
                    </div>
                    <div class="meta-item">
                        <div class="meta-label">灯光</div>
                        <div class="meta-value">${data.scene_lighting || '-'}</div>
                    </div>
                </div>
            `;
        }

        // 渲染镜头列表
        function renderShots(shots) {
            shotsContainer.innerHTML = shots.map((shot, index) => `
                <div class="shot-card">
                    <div class="shot-header">
                        <div class="shot-number">${String(index + 1).padStart(2, '0')}</div>
                        <div class="shot-info">
                            <h3>${shot.title || '镜头 ' + (index + 1)}</h3>
                            <div class="shot-type">${shot.shot_type || ''} · ${shot.id || ''}</div>
                        </div>
                    </div>
                    <div class="shot-content">
                        <!-- 左侧：图片 -->
                        <div>
                            <div class="shot-image-container">
                                ${shot.image_url 
                                    ? `<img class="shot-image" src="${shot.image_url}" alt="${shot.title}" loading="lazy">`
                                    : `<div class="shot-image-placeholder">暂无图片</div>`
                                }
                                ${shot.image_status 
                                    ? `<span class="image-status ${shot.image_status}">${shot.image_status}</span>`
                                    : ''
                                }
                            </div>
                            
                            <!-- 构图信息 -->
                            ${shot.composition ? `
                                <div class="detail-section" style="margin-top: 1rem;">
                                    <div class="detail-title">构图</div>
                                    <div class="composition-grid">
                                        <div class="composition-item">
                                            <div class="composition-label">角度</div>
                                            <div class="composition-value">${shot.composition.angle || '-'}</div>
                                        </div>
                                        <div class="composition-item">
                                            <div class="composition-label">焦点</div>
                                            <div class="composition-value">${shot.composition.focus || '-'}</div>
                                        </div>
                                        <div class="composition-item">
                                            <div class="composition-label">背景</div>
                                            <div class="composition-value">${shot.composition.background || '-'}</div>
                                        </div>
                                    </div>
                                </div>
                            ` : ''}
                            
                            <!-- 氛围标签 -->
                            <div style="margin-top: 0.75rem;">
                                ${shot.mood ? `<span class="tag tag-mood">🎭 ${shot.mood}</span>` : ''}
                                ${shot.lighting ? `<span class="tag tag-lighting">💡 ${shot.lighting}</span>` : ''}
                            </div>
                        </div>
                        
                        <!-- 右侧：详情 -->
                        <div class="shot-details">
                            <!-- 角色 -->
                            ${shot.characters && shot.characters.length > 0 ? `
                                <div class="detail-section">
                                    <div class="detail-title">角色</div>
                                    ${shot.characters.map(char => `
                                        <div class="character-item">
                                            <div class="character-ref">${char.ref || '未知角色'}</div>
                                            <div class="character-action">${char.action || ''}</div>
                                            ${char.emotion ? `<div class="character-emotion">情绪：${char.emotion}</div>` : ''}
                                        </div>
                                    `).join('')}
                                </div>
                            ` : ''}
                            
                            <!-- 台词 -->
                            ${shot.lines && shot.lines.length > 0 ? `
                                <div class="detail-section">
                                    <div class="detail-title">台词</div>
                                    <div class="lines-container">
                                        ${shot.lines.map(line => `
                                            <div class="line-item">
                                                <div class="line-speaker">${line.speaker || '未知'}</div>
                                                <div class="line-text">${line.text || ''}</div>
                                                ${line.emotion ? `<div class="line-emotion">${line.emotion}</div>` : ''}
                                                ${line.audio_url ? `
                                                    <audio class="audio-player" controls preload="none">
                                                        <source src="${line.audio_url}" type="audio/mpeg">
                                                    </audio>
                                                ` : ''}
                                            </div>
                                        `).join('')}
                                    </div>
                                </div>
                            ` : ''}
                            
                            <!-- Prompt -->
                            ${shot.prompt ? `
                                <div class="detail-section">
                                    <div class="detail-title">Prompt</div>
                                    <div class="prompt-text">${shot.prompt.trim()}</div>
                                </div>
                            ` : ''}
                        </div>
                    </div>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
