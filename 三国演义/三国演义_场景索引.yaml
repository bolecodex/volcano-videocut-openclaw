# 场景类型说明
# prologue: 开篇悬念/预告，特殊处理，历史感强
# reality: 主时间线的当前事件，正常色调，现实场景

# 边界触发词说明
# 章节边界: 章节/集数结构，如"第N回"、"开篇"
# 人物出场: 新人物首次出现，如"时有"、"时"、"忽见"
# 地点变化: 场景地点发生改变，如"来到"、"走进"、"回到"
# 事件发展: 情节自然推进，如"却说"、"次日"、"于是"
