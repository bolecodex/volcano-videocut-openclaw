name: 三国演义第一回配音脚本
version: 1.0
total_duration: 1200
audio_config:
  format: "mp3"
  sample_rate: 44100
  bitrate: 192k
  bgm_volume: 0.3
  sfx_volume: 0.7
  voice_volume: 1.0

voices:
  narrator:
    name: 旁白
    voice_type: "沉稳厚重男中音"
    style: "有历史感，富有感染力"
  liu_bei:
    name: 刘备
    voice_type: "仁德稳重男中音"
    style: "温和有力量，有王者之气"
  guan_yu:
    name: 关羽
    voice_type: "忠义豪爽男低音"
    style: "沉稳有力，忠义厚重"
  zhang_fei:
    name: 张飞
    voice_type: "勇猛豪爽男高音"
    style: "声如洪钟，粗犷豪爽"
  cao_cao:
    name: 曹操
    voice_type: "枭雄气质男中音"
    style: "有磁性，多机变，有野心"
  zhang_jiao:
    name: 张角
    voice_type: "宗教领袖男中音"
    style: "缥缈有穿透力，有蛊惑性"
  dong_zhuo:
    name: 董卓
    voice_type: "暴虐粗狂男低音"
    style: "粗狂傲慢，有威慑力"
  lu_zhi:
    name: 卢植
    voice_type: "儒雅稳重男中音"
    style: "正直儒雅，有文人气质"
  nan_lao:
    name: 南华老仙
    voice_type: "仙风道骨老年音"
    style: "缥缈悠远，有仙气"
  soldier:
    name: 士兵/群众
    voice_type: "多人混合音"
    style: "嘈杂有气势"

dubbing_script:
  - id: dub_001
    scene: 开场诗
    shot: opening_1
    duration: 10
    type: "narrator"
    content: "滚滚长江东逝水，浪花淘尽英雄。"
    bgm: "史诗级古风背景音乐，悲壮悠扬"
    sfx: "江水涛声，风声"

  - id: dub_002
    scene: 开场诗
    shot: opening_2
    duration: 8
    type: "narrator"
    content: "是非成败转头空：青山依旧在，几度夕阳红。"
    bgm: "史诗级古风背景音乐，悲壮悠扬"
    sfx: "鸟鸣声，风声"

  - id: dub_003
    scene: 开场诗
    shot: opening_3
    duration: 10
    type: "narrator"
    content: "白发渔樵江渚上，惯看秋月春风。"
    bgm: "史诗级古风背景音乐，悲壮悠扬"
    sfx: "江水涛声"

  - id: dub_004
    scene: 开场诗
    shot: opening_4
    duration: 12
    type: "narrator"
    content: "一壶浊酒喜相逢：古今多少事，都付笑谈中。"
    bgm: "史诗级古风背景音乐，悲壮悠扬，渐弱"
    sfx: "碰杯声，笑声"

  - id: dub_005
    scene: 宫廷之乱
    shot: court_1
    duration: 15
    type: "narrator"
    content: "话说天下大势，分久必合，合久必分。周末七国分争，并入于秦。及秦灭之后，楚、汉分争，又并入于汉。"
    bgm: "庄严宫廷背景音乐，沉稳厚重"
    sfx: "远处钟声"

  - id: dub_006
    scene: 宫廷之乱
    shot: court_2
    duration: 10
    type: "narrator"
    content: "汉朝自高祖斩白蛇而起义，一统天下。后来光武中兴，传至献帝，遂分为三国。"
    bgm: "庄严宫廷背景音乐，沉稳厚重"
    sfx: "朝臣低语声"

  - id: dub_007
    scene: 宫廷之乱
    shot: court_3
    duration: 15
    type: "narrator"
    content: "推其致乱之由，殆始于桓、灵二帝。桓帝禁锢善类，崇信宦官。"
    bgm: "紧张宫廷背景音乐，略带压抑"
    sfx: "低语声"

  - id: dub_008
    scene: 宫廷之乱
    shot: court_4
    duration: 12
    type: "narrator"
    content: "及桓帝崩，灵帝即位，大将军窦武、太傅陈蕃，共相辅佐。时有宦官曹节等弄权。"
    bgm: "紧张宫廷背景音乐，略带压抑"
    sfx: "低语声，脚步声"

  - id: dub_009
    scene: 宫廷之乱
    shot: court_5
    duration: 18
    type: "narrator"
    content: "窦武、陈蕃谋诛之，作事不密，反为所害，中涓自此愈横。"
    bgm: "紧张激烈背景音乐"
    sfx: "喊杀声，刀剑碰撞声，惨叫声"

  - id: dub_010
    scene: 宫廷之乱
    shot: court_6
    duration: 20
    type: "narrator"
    content: "建宁二年四月望日，帝御温德殿。方陞座，殿角狂风骤起，只见一条大青蛇，从梁上飞将下来，蟠于椅上。帝惊倒，左右急救入宫，百官俱奔避。"
    bgm: "恐怖诡异背景音乐"
    sfx: "狂风呼啸声，蛇吐信声，皇帝惊叫声，百官奔跑声"

  - id: dub_011
    scene: 宫廷之乱
    shot: court_7
    duration: 15
    type: "narrator"
    content: "须臾，蛇不见了。忽然大雷大雨，加以冰雹，落到半夜方止，坏却房屋无数。"
    bgm: "恐怖诡异背景音乐"
    sfx: "雷声轰鸣，大雨声，冰雹砸落声，百姓哭喊声"

  - id: dub_012
    scene: 宫廷之乱
    shot: court_8
    duration: 15
    type: "narrator"
    content: "建宁四年二月，洛阳地震；又海水泛滥，沿海居民，尽被大浪卷入海中。光和元年，雌鸡化雄。种种不祥，非止一端。"
    bgm: "诡异压抑背景音乐"
    sfx: "地震轰鸣声，海浪咆哮声，百姓惨叫声"

  - id: dub_013
    scene: 张角起义
    shot: ZhangJiao_1
    duration: 12
    type: "narrator"
    content: "时钜鹿郡有兄弟三人：一名张角，一名张宝，一名张梁。那张角本是个不第秀才，因入山采药。"
    bgm: "清幽山林背景音乐"
    sfx: "鸟叫声，树叶沙沙声"

  - id: dub_014
    scene: 张角起义
    shot: ZhangJiao_2
    duration: 15
    type: "narrator"
    content: "遇一老人，碧眼童颜，手执藜杖，唤角至一洞中，以天书三卷授之。"
    bgm: "神秘仙气背景音乐"
    sfx: "风声，脚步声"

  - id: dub_015
    scene: 张角起义
    shot: ZhangJiao_3
    duration: 12
    type: "nan_lao"
    content: "此名太平要术。汝得之，当代天宣化，普救世人。若萌异心，必获恶报。"
    bgm: "神圣仙气背景音乐"
    sfx: "仙乐声"

  - id: dub_016
    scene: 张角起义
    shot: ZhangJiao_3
    duration: 3
    type: "zhang_jiao"
    content: "敢问仙长尊姓大名？"
    bgm: "神圣仙气背景音乐"
    sfx: ""

  - id: dub_017
    scene: 张角起义
    shot: ZhangJiao_4
    duration: 8
    type: "nan_lao"
    content: "吾乃南华老仙也。"
    bgm: "神秘仙气背景音乐"
    sfx: "风声"

  - id: dub_018
    scene: 张角起义
    shot: ZhangJiao_5
    duration: 15
    type: "narrator"
    content: "言讫，化阵清风而去。角得此书，晓夜功习，能呼风唤雨，号为“太平道人”。"
    bgm: "神秘背景音乐"
    sfx: "翻书声，咒语声"

  - id: dub_019
    scene: 张角起义
    shot: ZhangJiao_6
    duration: 18
    type: "narrator"
    content: "中平元年正月内，疫气流行，张角散施符水，为人治病，自称“大贤良师”。"
    bgm: "乡间背景音乐"
    sfx: "百姓感谢声，咳嗽声"

  - id: dub_020
    scene: 张角起义
    shot: ZhangJiao_7
    duration: 20
    type: "narrator"
    content: "角有徒弟五百馀人，云游四方，皆能书符念咒。次后徒众日多，角乃立三十六方，大方万馀人，小方六七千，各立渠帅，称为将军。"
    bgm: "激昂背景音乐"
    sfx: "人群喧闹声，脚步声"

  - id: dub_021
    scene: 张角起义
    shot: ZhangJiao_8
    duration: 15
    type: "zhang_jiao"
    content: "苍天已死，黄天当立；岁在甲子，天下大吉！"
    bgm: "激昂起义背景音乐"
    sfx: "人群呼应声："苍天已死，黄天当立！""

  - id: dub_022
    scene: 张角起义
    shot: ZhangJiao_10
    duration: 15
    type: "narrator"
    content: "角遣其党马元义，暗赍金帛，结交中涓封胥，以为内应。不料弟子唐周乃径赴省中告变。"
    bgm: "紧张背景音乐"
    sfx: "马蹄声，急促脚步声"

  - id: dub_023
    scene: 张角起义
    shot: ZhangJiao_10
    duration: 10
    type: "narrator"
    content: "帝召大将军何进调兵擒马元义，斩之；次收封谞等一干人下狱。"
    bgm: "紧张背景音乐"
    sfx: "喊杀声，刀剑声"

  - id: dub_024
    scene: 张角起义
    shot: ZhangJiao_11
    duration: 15
    type: "narrator"
    content: "张角闻知事露，星夜举兵，自称“天公将军”，张宝称“地公将军”，张梁称“人公将军”。"
    bgm: "激昂起义背景音乐"
    sfx: "战鼓声，起义军呐喊声"

  - id: dub_025
    scene: 张角起义
    shot: ZhangJiao_11
    duration: 10
    type: "zhang_jiao"
    content: "今汉运将终，大圣人出。汝等皆宜顺天从正，以乐太平！"
    bgm: "激昂起义背景音乐"
    sfx: "起义军欢呼声"

  - id: dub_026
    scene: 英雄相遇
    shot: meet_1
    duration: 15
    type: "narrator"
    content: "且说张角一军，前犯幽州界分。幽州太守刘焉，闻得贼兵将至，随即出榜招募义兵。榜文行到涿县，引出涿县中一个英雄。"
    bgm: "乡间背景音乐"
    sfx: "人群喧闹声，马蹄声"

  - id: dub_027
    scene: 英雄相遇
    shot: meet_2
    duration: 20
    type: "narrator"
    content: "那人不甚好读书；性宽和，寡言语，喜怒不言于色；素有大志，专好结交天下豪杰；生得身长七尺五寸，两耳垂肩，双手过膝，目能自顾其耳，面如冠玉，唇如涂脂；中山靖王刘胜之后，汉景帝阁下玄孙：姓刘，名备，字玄德。"
    bgm: "英雄出场背景音乐，舒缓有气势"
    sfx: "人群低语声"

  - id: dub_028
    scene: 英雄相遇
    shot: meet_6
    duration: 8
    type: "narrator"
    content: "当日见了榜文，玄德慨然长叹。"
    bgm: "街头背景音乐"
    sfx: "人群喧闹声"

  - id: dub_029
    scene: 英雄相遇
    shot: meet_6
    duration: 7
    type: "zhang_fei"
    content: "大丈夫不与国家出力，何故长叹？"
    bgm: "街头背景音乐"
    sfx: "洪亮声音，人群安静下来"

  - id: dub_030
    scene: 英雄相遇
    shot: meet_7
    duration: 15
    type: "narrator"
    content: "玄德回视其人：身长八尺，豹头环眼，燕颔虎须，声若巨雷，势如奔马。其人姓张，名飞，字翼德。"
    bgm: "英雄出场背景音乐，豪爽"
    sfx: ""

  - id: dub_031
    scene: 英雄相遇
    shot: meet_8
    duration: 5
    type: "liu_bei"
    content: "我本汉室宗亲，姓刘，名备。今闻黄巾倡乱，有志欲破贼安民；恨力不能，故长叹耳。"
    bgm: "店内背景音乐"
    sfx: "酒碗碰撞声"

  - id: dub_032
    scene: 英雄相遇
    shot: meet_8
    duration: 10
    type: "zhang_fei"
    content: "吾颇有资财，当招募乡勇，与公同举大事，如何？"
    bgm: "店内背景音乐"
    sfx: "拍桌子声"

  - id: dub_033
    scene: 英雄相遇
    shot: meet_9
    duration: 5
    type: "narrator"
    content: "玄德甚喜，遂与同入村店中饮酒。正饮间，见一大汉，推著一辆车子，到店门首歇了。"
    bgm: "店内背景音乐"
    sfx: "脚步声，车子停放声"

  - id: dub_034
    scene: 英雄相遇
    shot: meet_9
    duration: 10
    type: "guan_yu"
    content: "快斟酒来吃，我待赶入城去投军。"
    bgm: "店内背景音乐"
    sfx: "洪亮声音"

  - id: dub_035
    scene: 英雄相遇
    shot: meet_10
    duration: 15
    type: "narrator"
    content: "玄德看其人：身长九尺，髯长二尺；面如重枣，唇如涂脂；丹凤眼，卧蚕眉：相貌堂堂，威风凛凛。其人姓关，名羽，字云长。"
    bgm: "英雄出场背景音乐，忠义厚重"
    sfx: ""

  - id: dub_036
    scene: 桃园结义
    shot: taoyuan_1
    duration: 15
    type: "zhang_fei"
    content: "吾庄后有一桃园，花开正盛；明日当于园中祭告天地，我三人结为兄弟，协力同心，然后可图大事。"
    bgm: "温馨背景音乐"
    sfx: "酒碗碰撞声"

  - id: dub_037
    scene: 桃园结义
    shot: taoyuan_1
    duration: 5
    type: "liu_bei"
    content: "如此甚好。"
    bgm: "温馨背景音乐"
    sfx: ""

  - id: dub_038
    scene: 桃园结义
    shot: taoyuan_1
    duration: 5
    type: "guan_yu"
    content: "如此甚好。"
    bgm: "温馨背景音乐"
    sfx: ""

  - id: dub_039
    scene: 桃园结义
    shot: taoyuan_3
    duration: 25
    type: "liu_bei+guan_yu+zhang_fei"
    content: "念刘备、关羽、张飞，虽然异姓，既结为兄弟，则同心协力，救困扶危；上报国家，下安黎庶；不求同年同月同日生，只愿同年同月同日死。皇天后土，实鉴此心。背义忘恩，天人共戮！"
    bgm: "庄严神圣背景音乐"
    sfx: "焚香声，鸟鸣声"

  - id: dub_040
    scene: 桃园结义
    shot: taoyuan_4
    duration: 15
    type: "narrator"
    content: "誓毕，拜玄德为兄，关羽次之，张飞为弟。祭罢天地，复宰牛设酒，聚乡中勇士，得三百馀人，就桃园中痛饮一醉。"
    bgm: "喜庆激昂背景音乐"
    sfx: "人群欢呼声，碰杯声"

  - id: dub_041
    scene: 首战告捷
    shot: battle_3
    duration: 15
    type: "narrator"
    content: "不数日，人报黄巾贼将程远志统兵五万来犯涿郡。刘焉令邹靖引玄德等三人，统兵五百，前去破敌。"
    bgm: "紧张战前背景音乐"
    sfx: "战鼓声，马蹄声"

  - id: dub_042
    scene: 首战告捷
    shot: battle_4
    duration: 10
    type: "liu_bei"
    content: "反国逆贼，何不早降！"
    bgm: "战场背景音乐"
    sfx: "风声，战鼓声"

  - id: dub_043
    scene: 首战告捷
    shot: battle_5
    duration: 8
    type: "narrator"
    content: "程远志大怒，遣副将邓茂出战。"
    bgm: "激烈战斗背景音乐"
    sfx: "喊杀声"

  - id: dub_044
    scene: 首战告捷
    shot: battle_5
    duration: 7
    type: "zhang_fei"
    content: "鼠辈安敢造次！"
    bgm: "激烈战斗背景音乐"
    sfx: "长矛刺破铠甲声，惨叫声"

  - id: dub_045
    scene: 首战告捷
    shot: battle_6
    duration: 8
    type: "narrator"
    content: "程远志见折了邓茂，拍马舞刀，直取张飞。云长舞动大刀，纵马飞迎。"
    bgm: "激烈战斗背景音乐"
    sfx: "马蹄声，喊杀声"

  - id: dub_046
    scene: 首战告捷
    shot: battle_6
    duration: 7
    type: "guan_yu"
    content: "逆贼受死！"
    bgm: "激烈战斗背景音乐"
    sfx: "大刀劈砍声，惨叫声"

  - id: dub_047
    scene: 首战告捷
    shot: battle_7
    duration: 10
    type: "narrator"
    content: "众贼见程远志被斩，皆倒戈而走。玄德挥军追赶，投降者不计其数，大胜而回。"
    bgm: "胜利背景音乐"
    sfx: "军队欢呼声，追击声"

  - id: dub_048
    scene: 曹操出场
    shot: cao_5
    duration: 15
    type: "narrator"
    content: "张梁、张宝引败残军士，夺路而走。忽见一彪军马，尽打红旗，当头来到，截住去路。为首闪出一将：身长七尺，细眼长髯；官拜骑都尉；沛国谯郡人也，姓曹，名操，字孟德。"
    bgm: "枭雄出场背景音乐"
    sfx: "马蹄声，战马嘶鸣声"

  - id: dub_049
    scene: 曹操出场
    shot: cao_7
    duration: 15
    type: "cao_cao"
    content: "逆贼哪里走！杀！"
    bgm: "激烈战斗背景音乐"
    sfx: "喊杀声，兵器碰撞声"

  - id: dub_050
    scene: 回救董卓
    shot: end_2
    duration: 15
    type: "narrator"
    content: "玄德引关、张回广宗，到得半路，只见一簇军马，护送一辆槛车；车中之囚，乃卢植也。玄德大惊，滚鞍下马。"
    bgm: "悲伤背景音乐"
    sfx: "马蹄声，铁链声"

  - id: dub_051
    scene: 回救董卓
    shot: end_3
    duration: 20
    type: "lu_zhi"
    content: "我围张角，将次可破；因角用妖术，未能即胜。朝廷差黄门左丰前来体探，问我索取贿赂。我答曰：‘军粮尚缺，安有馀钱奉承天使？’左丰挟恨，回奏朝廷，说我高垒不战，惰慢军心；因此朝廷震怒，遣中郎将董卓来代将我兵，取我回京问罪。"
    bgm: "悲伤背景音乐"
    sfx: "卢植悲愤的声音"

  - id: dub_052
    scene: 回救董卓
    shot: end_4
    duration: 10
    type: "zhang_fei"
    content: "甚么！这等昏官，待我斩了护送军士，救了卢中郎！"
    bgm: "愤怒背景音乐"
    sfx: "张飞怒吼声，拔剑声"

  - id: dub_053
    scene: 回救董卓
    shot: end_4
    duration: 5
    type: "liu_bei"
    content: "三弟不可！朝廷自有公论，汝岂可造次？"
    bgm: "愤怒背景音乐"
    sfx: "阻拦声"

  - id: dub_054
    scene: 回救董卓
    shot: end_6
    duration: 15
    type: "narrator"
    content: "三人引军北行，忽闻山后喊声大震。玄德引关、张纵马上高冈望之，见汉军大败，后面漫山塞野，黄巾盖地而来，旗上大书“天公将军”。"
    bgm: "紧张战斗背景音乐"
    sfx: "喊杀声，战鼓声"

  - id: dub_055
    scene: 回救董卓
    shot: end_6
    duration: 5
    type: "liu_bei"
    content: "此张角也！可速战！"
    bgm: "紧张战斗背景音乐"
    sfx: "拔剑声"

  - id: dub_056
    scene: 回救董卓
    shot: end_6
    duration: 10
    type: "narrator"
    content: "三人飞马引军而出。张角正杀败董卓，乘势赶来，忽遇三人冲杀，角军大乱，败走五十馀里。"
    bgm: "激烈战斗背景音乐"
    sfx: "喊杀声，兵器碰撞声"

  - id: dub_057
    scene: 回救董卓
    shot: end_7
    duration: 5
    type: "dong_zhuo"
    content: "三位壮士，现居何职啊？"
    bgm: "军帐背景音乐"
    sfx: "傲慢的语气"

  - id: dub_058
    scene: 回救董卓
    shot: end_7
    duration: 5
    type: "liu_bei"
    content: "白身。"
    bgm: "军帐背景音乐"
    sfx: ""

  - id: dub_059
    scene: 回救董卓
    shot: end_8
    duration: 10
    type: "zhang_fei"
    content: "我等亲赴血战，救了这厮，他却如此无礼！若不杀他，难消我气！"
    bgm: "愤怒背景音乐"
    sfx: "张飞怒吼声，提刀声"

  - id: dub_060
    scene: 回救董卓
    shot: end_9
    duration: 15
    type: "narrator"
    content: "毕竟董卓性命如何，且听下文分解。"
    bgm: "悬疑背景音乐，渐停"
    sfx: "悬念音效"
