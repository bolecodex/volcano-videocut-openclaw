# style.yaml - 全局绘画风格与视觉参数配置
# 所有绘图（角色/场景/分镜）和视频生成统一从此文件读取风格参数
# 修改画风只需改这一处，全流水线自动生效

version: "1.0"

# ═══════════════════════════════════════════
# 全局风格基准词
# ═══════════════════════════════════════════

style_base: >-
  真人写实高清，超细节刻画，古风人像写实，光影细腻，氛围感拉满，
  服饰纹理清晰，面部神态精准，暗沉古朴色调，市井烟火氛围

# 角色立绘专用风格词（纯画质词，不含氛围/色调/光线/背景词）
style_base_character: >-
  真人写实高清，超细节刻画，古风人像写实，光影细腻，
  服饰纹理清晰，面部神态精准

# 负面提示词（部分模型支持）
negative_prompt: >-
  低质量，模糊，变形，多余手指，文字水印，
  过度曝光，卡通风格，2D平面

# ═══════════════════════════════════════════
# 图片尺寸配置
# ═══════════════════════════════════════════

image_sizes:
  character:
    preset: "portrait_4_3"
    description: "角色全身立绘，3:4 竖版，白底设定图"

  storyboard:
    preset: "portrait_16_9"
    description: "分镜头配图，9:16 竖版，适配抖音/快手/小红书"

  scene:
    preset: "landscape_16_9"
    description: "场景全景图，16:9 横版"

# ═══════════════════════════════════════════
# 视频参数配置
# ═══════════════════════════════════════════

video:
  aspect_ratio: "9:16"
  resolution: "720p"
  duration_default: "5"
  fps: 24

# ═══════════════════════════════════════════
# 场景类型色调预设
# ═══════════════════════════════════════════

mood_presets:
  reality: "暗沉古朴色调，自然光线，市井烟火氛围"
  flashback: "褪色暖调，柔光暗角，颗粒感，回忆氛围"
  dream: "昏暗阴冷色调，雾气弥漫，诡异光影"
  montage: "暖调柔光，时间流逝感，日常温馨"
  prologue: "高对比暗调，悬疑氛围，局部高光"

# ═══════════════════════════════════════════
# 光照预设
# ═══════════════════════════════════════════

lighting_presets:
  day_indoor: "暖调侧光，窗户光斑，柔和漫射"
  day_outdoor: "明亮自然光，天空高远，层次分明"
  night_indoor: "暖黄油灯/烛光，暗角光晕，明暗对比强"
  night_outdoor: "冷调月光/火把，深邃阴影，星空微光"
  dawn: "金粉暖光，雾气氤氲，天际泛红"
  dusk: "夕阳橘红，长影斜照，暖金色调"
